name: CLA Check

on:
  issue_comment:
    types: [created]
  pull_request_target:
    types: [opened, closed, synchronize]

permissions:
  actions: write
  contents: write
  pull-requests: write
  statuses: write

jobs:
  cla-assistant:
    runs-on: ubuntu-latest
    steps:
      - name: CLA Assistant
        # contributor-assistant/github-action stores signatures as JSON in the
        # cla-signatures branch of this repo. Requires a PAT with repo scope
        # stored as the PERSONAL_ACCESS_TOKEN secret in repository settings.
        uses: contributor-assistant/github-action@v2.6.1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PERSONAL_ACCESS_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}
        with:
          path-to-signatures: signatures/cla.json
          path-to-document: https://github.com/${{ github.repository }}/blob/main/CLA/individual-cla.md
          branch: cla-signatures
          allowlist: dependabot[bot],renovate[bot]
          # Require re-sign if the CLA document is updated materially.
          # Bump this string whenever the CLA text changes in a material way.
          lock-pullrequest-aftermerge: false
